<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Dark Passages</title>

    <!-- PWA: lets the game be added to the home screen and launched
         without any browser chrome (address bar / nav bar) on Android
         and iOS. Real fullscreen without the browser UI is only possible
         once installed this way — a plain browser tab can't hide it. -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#0b0d0a" />
    <link rel="icon" href="./favicon-32.png" sizes="32x32" />
    <link rel="icon" href="./favicon-16.png" sizes="16x16" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

    <!-- iOS-specific "installed web app" behavior (Android reads the manifest above instead) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dark Passages" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-crt-bg">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
